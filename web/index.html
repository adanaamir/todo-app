<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.
    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.
    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base
    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Ordely – A beautiful to-do app powered by Flutter & Firebase.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ordely">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Ordely</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Splash screen style while Flutter loads */
    body {
      margin: 0;
      background-color: #0F0F1A;
    }
    #splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(180deg, #0F0F1A 0%, #1A1A2E 100%);
    }
    .splash-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #6C63FF, #9D4EDD);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 8px 30px rgba(108, 99, 255, 0.4);
    }
    .splash-title {
      color: #F0F0FF;
      font-family: sans-serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .splash-sub {
      color: #9090B0;
      font-family: sans-serif;
      font-size: 14px;
      margin-top: 6px;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(108,99,255,0.2);
      border-top-color: #6C63FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 32px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Splash shown while Flutter boots -->
  <div id="splash">
    <div class="splash-icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 12l2 2 4-4" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="12" cy="12" r="9" stroke="white" stroke-width="2"/>
      </svg>
    </div>
    <div class="splash-title">Ordely</div>
    <div class="splash-sub">Your tasks, organized</div>
    <div class="spinner"></div>
  </div>

  <script>
    // Remove splash once Flutter app is ready
    window.addEventListener('flutter-first-frame', function() {
      var splash = document.getElementById('splash');
      if (splash) {
        splash.style.opacity = '0';
        splash.style.transition = 'opacity 0.4s ease';
        setTimeout(() => splash.remove(), 400);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
